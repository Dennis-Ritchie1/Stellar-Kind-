apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-kind-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stellar-kind-backend
  template:
    metadata:
      labels:
        app: stellar-kind-backend
    spec:
      containers:
        - name: backend
          image: stellar-kind/backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/stellar-kind
---
apiVersion: v1
kind: Service
metadata:
  name: stellar-kind-backend
spec:
  selector:
    app: stellar-kind-backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
