version: '3.8'
services:
  frontend:
    build: ../../frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
  backend:
    build: ../../backend
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/stellar-kind
    depends_on:
      - db
  db:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stellar-kind
